<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="4" fill="#080a0c"/>

  <!-- Globe circle outline -->
  <circle cx="16" cy="15" r="9.5" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.9"/>

  <!-- Equator line -->
  <line x1="6.5" y1="15" x2="25.5" y2="15" stroke="#ffffff" stroke-width="1" opacity="0.5"/>

  <!-- Vertical meridian -->
  <line x1="16" y1="5.5" x2="16" y2="24.5" stroke="#ffffff" stroke-width="1" opacity="0.5"/>

  <!-- Curved latitude lines (top and bottom) -->
  <path d="M 7.5 10.5 Q 16 8 24.5 10.5" fill="none" stroke="#ffffff" stroke-width="0.9" opacity="0.45"/>
  <path d="M 7.5 19.5 Q 16 22 24.5 19.5" fill="none" stroke="#ffffff" stroke-width="0.9" opacity="0.45"/>

  <!-- Red pulse dot — top right of globe (live signal) -->
  <circle cx="23" cy="8" r="3.2" fill="#e03d3c" opacity="0.25"/>
  <circle cx="23" cy="8" r="2" fill="#e03d3c"/>
</svg>
